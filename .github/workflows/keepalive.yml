name: Keep Supabase Awake

on:
  schedule:
    - cron: '17 14 * * 1,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping keepalive function
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_KEEPALIVE_TOKEN: ${{ secrets.SUPABASE_KEEPALIVE_TOKEN }}
        run: |
          curl --fail-with-body --silent --show-error \
            --request GET \
            --header "Authorization: Bearer ${SUPABASE_KEEPALIVE_TOKEN}" \
            "${SUPABASE_URL}/functions/v1/keepalive-db"
