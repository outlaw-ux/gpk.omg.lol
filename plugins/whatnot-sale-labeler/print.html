<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Whatnot Sale Label</title>
    <link rel="stylesheet" href="print.css">
  </head>
  <body>
    <main class="label" aria-label="Whatnot sale label">
      <div class="media">
        <img id="labelImage" alt="">
      </div>
      <section class="details">
        <div class="meta">
          <span id="lotNumber"></span>
          <strong id="price"></strong>
        </div>
        <h1 id="productName"></h1>
        <p id="winner"></p>
      </section>
    </main>
    <p id="screenStatus" class="screen-only" role="status">Preparing label...</p>

    <script src="print.js"></script>
  </body>
</html>
